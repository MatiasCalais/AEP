<!DOCTYPE html>

<html lang="pt-br">

    <head>
    <title>AEP MapaApredizagem</title>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styile.css">
  </head>

  <body>


    <main>
        <section class="Base" id = "TelaInicial"><!--grupo da telea inicial--> 
            <h1>Seu mapa para Ensino Basico</h1>
            <p>digite o que deseje aprender e um mapa sera criado</p>


              <div class="BarraPesquisa"><!-- BARRA DE PESQUISA-->
                <input 
                type = "text"
                class= "EstilBarra"
                id = "PesquisaBarra"
                placeholder="ex: matematica basica, leitura, geografia baisaca"
                maxlength="50"
                />
                <button class="PesquisaBTN" id="GeradorBTN" onclick="GeradorMapa()">Gerar Mapa</button>
              </div>
              
              <div class="exemplos"> <!-- EXEMPLOS DE ESPLORAÇÕA-->
                <button class="axemploPesquisa" onclick="Exemplo(this)">matematica basica</button>
                <button class="axemploPesquisa" onclick="Exemplo(this)">portugues basica</button>
                <button class="axemploPesquisa" onclick="Exemplo(this)">desenho</button>
                <button class="axemploPesquisa" onclick="Exemplo(this)">financias</button>
              </div>
        </section>
       
       <div id="erro-msg"></div>


       <div id="loading">
          <p class = "loading-texto">so um momento...</p>
          <p class = "loading-Passos" id="loadingPassos">pesquisando</p>
       </div>

        <section id="result"></section>
        
    </main>
    <script src = "scrypt.js"></script>
  </body>
</html>
